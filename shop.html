<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <header class="site-header">
        <div class="container header-container">
            <a href="index.html" class="logo"> AnimeDreams</a>
            <nav class="main-nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="article.html" class="nav-link">Article</a></li>
                    <li><a href="shop.html" class="nav-link active">Shop</a></li>
                    <li><a href="about.html" class="nav-link">About</a></li>

            </nav>
        </div>

    <main>
        <section class="shop-hero" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('images/shop-banner.jpg') center/cover;">
            <div class="container shop-hero-content">
                <h1>Shop Title</h1>
                <p>Find your favorite anime figures, manga, and exclusive collectibles.</p>
                <a href="#catalog" class="btn btn-dark">Browse Now</a>
            </div>
        </section>

        <section id="catalog" class="catalog-section">
            <div class="container">
                <h2 class="section-title">Section heading</h2>
                <div class="product-grid">
                    <div class="product-card">
                        <img src="images/prod-1.jpg" alt="Featured Product" class="responsive-img">
                        <div class="product-info">
                            <h3>Featured product</h3>
                            <span class="price">$19.99</span>
                        </div>
                    </div>
                    <div class="product-card">
                        <img src="images/prod-2.jpg" alt="Anime Product" class="responsive-img">
                        <div class="product-info">
                            <h3>Product</h3>
                            <span class="price">$19.99</span>
                        </div>
                    </div>
                    <div class="product-card">
                        <img src="images/prod-3.jpg" alt="Anime Product" class="responsive-img">
                        <div class="product-info">
                            <h3>Product</h3>
                            <span class="price">$19.99</span>
                        </div>
                    </div>
                    <div class="product-card">
                        <img src="images/prod-4.jpg" alt="Anime Product" class="responsive-img">
                        <div class="product-info">
                            <h3>Product</h3>
                            <span class="price">$19.99</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-grid">
            <div class="footer-brand"><span class="logo">Site name</span></div>
            <div class="footer-links-column"><h4>Topic</h4><a href="#">Page</a></div>
            <div class="footer-links-column"><h4>Topic</h4><a href="#">Page</a></div>
            <div class="footer-links-column"><h4>Topic</h4><a href="#">Page</a></div>
